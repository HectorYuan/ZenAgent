[tool.poetry]
name = "zenagent"
version = "0.1.0"
description = "ZenAgent - Independent Agent Platform based on Monorepo Architecture"
authors = ["ZenAgent Team"]
readme = "README.md"
packages = [
    { include = "LLMInfra", from = "packages" },
    { include = "Runtime", from = "packages" },
    { include = "ZenAgent", from = "packages" },
    { include = "SwarmFly", from = "packages" },
    { include = "SoulTeam", from = "packages" },
]

[tool.poetry.dependencies]
python = ">=3.10"
fastapi = "^0.104.0"
uvicorn = {extras = ["standard"], version = "^0.24.0"}
pydantic = "^2.5.0"
pydantic-settings = "^2.1.0"
redis = "^5.0.0"
httpx = "^0.25.0"
python-multipart = "^0.0.6"
sqlalchemy = "^2.0.23"
alembic = "^1.12.1"
prefect = "^2.14.0"
loguru = "^0.7.2"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.3"
pytest-asyncio = "^0.21.1"
pytest-cov = "^4.1.0"
black = "^23.11.0"
ruff = "^0.1.6"
mypy = "^1.7.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.workspace]
members = [
    "packages/LLMInfra",
    "packages/Runtime",
    "packages/ZenAgent",
    "packages/SwarmFly",
    "packages/SoulTeam",
]

[tool.poetry.experimental.workspace]
enabled = true

[tool.black]
line-length = 100
target-version = ['py310']

[tool.ruff]
line-length = 100
target-version = "py310"
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
