name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install ruff mypy black isort
      - name: Run Ruff
        run: ruff check . --output-format=github
      - name: Check format
        run: ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install mypy pydantic && pip install -e .
      - name: Run mypy
        run: mypy packages/ --ignore-missing-imports

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e .[dev] pytest pytest-asyncio pytest-cov
      - name: Run Tests
        run: pytest tests/unit/ -v --cov=packages --cov-report=xml --cov-fail-under=60
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests

  e2e-phase1:
    name: E2E Phase 1 - Core Initialization
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e .[dev] pytest pytest-asyncio pytest-cov redis
      - name: Run Phase 1 Tests
        run: pytest tests/e2e/test_phase1_*.py -v --cov=packages --cov-report=xml:coverage-phase1.xml
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage-phase1.xml
          flags: e2e-phase1

  e2e-phase2:
    name: E2E Phase 2 - Team & Evolution
    runs-on: ubuntu-latest
    needs: e2e-phase1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e .[dev] pytest pytest-asyncio pytest-cov
      - name: Run Phase 2 Tests
        run: pytest tests/e2e/test_phase2_*.py -v --cov=packages --cov-report=xml:coverage-phase2.xml
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage-phase2.xml
          flags: e2e-phase2

  e2e-phase3:
    name: E2E Phase 3 - LLM Integration
    runs-on: ubuntu-latest
    needs: e2e-phase2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e .[dev] pytest pytest-asyncio pytest-cov
      - name: Run Phase 3 Tests (Mock LLM)
        run: pytest tests/e2e/test_phase3_*.py -v --cov=packages --cov-report=xml:coverage-phase3.xml
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage-phase3.xml
          flags: e2e-phase3

  e2e-real-llm:
    name: E2E Real LLM (Optional)
    runs-on: ubuntu-latest
    needs: e2e-phase3
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e .[dev] pytest pytest-asyncio pytest-cov
      - name: Run Real LLM Tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODELNEXUS_URL: ${{ secrets.MODELNEXUS_URL }}
        run: |
          pytest tests/e2e/test_real_llm.py -v || echo "Real LLM tests skipped - no API key configured"
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install pip-audit bandit safety
      - name: Run Bandit
        run: bandit -r packages/ -f json -o bandit-report.json || true

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: pip install build twine
      - name: Build package
        run: python -m build
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
