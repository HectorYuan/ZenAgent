# Nacos 单机配置

# 服务器配置
server.port=8848

# 单机模式
spring.datasource.platform=sqlite
db.num=1
db.url.0=jdbc:sqlite:/home/nacos/data/nacos.db
db.user=nacos
db.password=nacos

# 连接池配置
spring.sqlinit.platform=sqlite

# 认证配置
nacos.core.auth.enabled=false
nacos.core.auth.server.identity.key=
nacos.core.auth.server.identity.value=

# 命名空间配置
nacos.namespace=public

# 日志配置
nacos.logs.path=/home/nacos/logs

# 内存配置
JVM_XMS=256m
JVM_XMX=512m
JVM_XMN=128m
